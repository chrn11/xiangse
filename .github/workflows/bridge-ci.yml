name: LegadoBridge CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-bridge:
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4'

      - name: 编译 LegadoBridge（SPM）
        working-directory: LegadoBridge
        run: |
          swift package resolve
          swift build -c release -v 2>&1 | tee spm-build.log

      - name: 准备 insert_dylib
        run: |
          if ! command -v insert_dylib; then
            git clone --depth 1 https://github.com/tyilo/insert_dylib /tmp/insert_dylib
            cd /tmp/insert_dylib && xcodebuild -configuration Release
            sudo cp build/Release/insert_dylib /usr/local/bin/ || cp build/Release/insert_dylib "$HOME/bin/" || true
          fi

      - name: 重打包 IPA
        run: |
          chmod +x tools/repack/repack.sh
          DYLIB=$(find LegadoBridge/.build -name 'LegadoBridge' -type f 2>/dev/null | head -1 || true)
          bash tools/repack/repack.sh \
            "ipa/香色闺阁2.56.1_未加密.ipa" \
            "${DYLIB:-}" \
            "dist/StandarReader-legado-bridge.ipa"

      - uses: actions/upload-artifact@v4
        with:
          name: StandarReader-legado-bridge
          path: |
            dist/*
            LegadoBridge/spm-build.log
