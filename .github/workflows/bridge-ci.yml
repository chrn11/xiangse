name: LegadoBridge CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  # 固定夹具硬门禁（不依赖网络 / 不依赖 Xcode）
  fixture-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: 固定夹具与 Hooks 硬门禁
        run: |
          python3 tools/ci/validate_fixtures.py
          python3 tools/ci/validate_hooks_gate.py
          python3 -m unittest discover -s tools/ci -p 'test_*.py'

  build-bridge:
    needs: [fixture-gate]
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4'

      - name: 同步 legado-ios 引擎（本地已 vendor 则跳过）
        run: |
          if [[ ! -d LegadoBridge/Sources/LegadoBridge/Vendor/Core/RuleEngine ]]; then
            if [[ -n "${{ secrets.LEGADO_IOS_PAT }}" ]]; then
              git clone --depth 1 "https://x-access-token:${{ secrets.LEGADO_IOS_PAT }}@github.com/chrn11/legado-ios.git" /tmp/legado-ios
              chmod +x tools/sync_legado_vendor.sh
              LEGADO_IOS_ROOT=/tmp/legado-ios bash tools/sync_legado_vendor.sh
            else
              echo "Vendor 未提交且无 LEGADO_IOS_PAT，尝试直接编译"
            fi
          else
            echo "已存在 LegadoBridge/Sources/LegadoBridge/Vendor，跳过同步"
          fi

      - name: 编译 LegadoBridge（iOS arm64）
        working-directory: LegadoBridge
        run: |
          set -euo pipefail
          swift package resolve
          echo "==> xcodebuild -list:"
          xcodebuild -list 2>&1 | tee -a spm-build.log || true
          xcodebuild \
            -scheme LegadoBridge \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -derivedDataPath .build \
            CODE_SIGNING_ALLOWED=NO \
            BUILD_LIBRARY_FOR_DISTRIBUTION=NO \
            -skipPackagePluginValidation \
            2>&1 | tee -a spm-build.log
          echo "==> 产物:"
          find .build -name 'LegadoBridge' -type f -path '*Release-iphoneos*' | head -5

      - name: 准备 insert_dylib
        run: |
          if ! command -v insert_dylib; then
            git clone --depth 1 https://github.com/tyilo/insert_dylib /tmp/insert_dylib
            cd /tmp/insert_dylib && xcodebuild -configuration Release
            sudo cp build/Release/insert_dylib /usr/local/bin/ || cp build/Release/insert_dylib "$HOME/bin/" || true
            mkdir -p "$HOME/bin"
            export PATH="$HOME/bin:$PATH"
            echo "$HOME/bin" >> "$GITHUB_PATH"
          fi

      - name: 重打包 IPA 并校验注入
        run: |
          set -euo pipefail
          chmod +x tools/repack/repack.sh tools/repack/verify_ipa.sh
          DYLIB=$(find LegadoBridge/.build -type f -name 'LegadoBridge' \
            -path '*Release-iphoneos*' -not -path '*dSYM*' 2>/dev/null | head -1 || true)
          if [[ -z "$DYLIB" ]]; then
            DYLIB=$(find LegadoBridge/.build -type f -name 'libLegadoBridge.dylib' \
              -path '*Release-iphoneos*' 2>/dev/null | head -1 || true)
          fi
          echo "==> 选用 dylib: ${DYLIB:-（无，将仅写 manifest）}"
          mkdir -p dist
          bash tools/repack/repack.sh \
            "ipa/香色闺阁2.56.1_未加密.ipa" \
            "${DYLIB:-}" \
            "dist/StandarReader-legado-bridge.ipa"
          # repack.sh 末尾已调用 verify_ipa.sh（LC_LOAD_DYLIB / arm64 / Scheme / SHA256）
          ls -la dist/
          test -f dist/StandarReader-legado-bridge.ipa.sha256

      # 仅 Artifact，不创建 GitHub Release
      - uses: actions/upload-artifact@v4
        with:
          name: LegadoBridge-IPA
          path: |
            dist/StandarReader-legado-bridge.ipa
            dist/StandarReader-legado-bridge.ipa.sha256
            LegadoBridge/spm-build.log
          if-no-files-found: warn

      - uses: actions/upload-artifact@v4
        with:
          name: LegadoBridge-build-logs
          path: |
            LegadoBridge/.build/**/*
            LegadoBridge/spm-build.log
          if-no-files-found: warn
          retention-days: 7

  build-bridge-debug:
    needs: [fixture-gate]
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4'

      - name: 同步 legado-ios 引擎（本地已 vendor 则跳过）
        run: |
          if [[ ! -d LegadoBridge/Sources/LegadoBridge/Vendor/Core/RuleEngine ]]; then
            if [[ -n "${{ secrets.LEGADO_IOS_PAT }}" ]]; then
              git clone --depth 1 "https://x-access-token:${{ secrets.LEGADO_IOS_PAT }}@github.com/chrn11/legado-ios.git" /tmp/legado-ios
              chmod +x tools/sync_legado_vendor.sh
              LEGADO_IOS_ROOT=/tmp/legado-ios bash tools/sync_legado_vendor.sh
            else
              echo "Vendor 未提交且无 LEGADO_IOS_PAT，尝试直接编译"
            fi
          else
            echo "已存在 LegadoBridge/Sources/LegadoBridge/Vendor，跳过同步"
          fi

      - name: 编译 LegadoBridge + LegadoBridgeDebug（iOS arm64）
        working-directory: LegadoBridge
        run: |
          set -euo pipefail
          swift package resolve
          echo "==> xcodebuild LegadoBridge:"
          xcodebuild \
            -scheme LegadoBridge \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -derivedDataPath .build \
            CODE_SIGNING_ALLOWED=NO \
            BUILD_LIBRARY_FOR_DISTRIBUTION=NO \
            -skipPackagePluginValidation \
            2>&1 | tee -a spm-build-debug.log
          echo "==> xcodebuild LegadoBridgeDebug:"
          xcodebuild \
            -scheme LegadoBridgeDebug \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -derivedDataPath .build \
            CODE_SIGNING_ALLOWED=NO \
            BUILD_LIBRARY_FOR_DISTRIBUTION=NO \
            -skipPackagePluginValidation \
            2>&1 | tee -a spm-build-debug.log
          echo "==> 产物:"
          find .build -name 'LegadoBridge' -type f -path '*Release-iphoneos*' | head -5
          find .build -name 'LegadoBridgeDebug' -type f -path '*Release-iphoneos*' | head -5

      - name: 准备 insert_dylib
        run: |
          if ! command -v insert_dylib; then
            git clone --depth 1 https://github.com/tyilo/insert_dylib /tmp/insert_dylib
            cd /tmp/insert_dylib && xcodebuild -configuration Release
            sudo cp build/Release/insert_dylib /usr/local/bin/ || cp build/Release/insert_dylib "$HOME/bin/" || true
            mkdir -p "$HOME/bin"
            export PATH="$HOME/bin:$PATH"
            echo "$HOME/bin" >> "$GITHUB_PATH"
          fi

      - name: 重打包 debug IPA（双 dylib + manifest）
        run: |
          set -euo pipefail
          chmod +x tools/repack/repack_forensics.sh tools/repack/verify_forensics_ipa.sh
          DYLIB=$(find LegadoBridge/.build -type f -name 'LegadoBridge' \
            -path '*Release-iphoneos*' -not -path '*dSYM*' 2>/dev/null | head -1 || true)
          if [[ -z "$DYLIB" ]]; then
            DYLIB=$(find LegadoBridge/.build -type f -name 'libLegadoBridge.dylib' \
              -path '*Release-iphoneos*' 2>/dev/null | head -1 || true)
          fi
          DEBUG_DYLIB=$(find LegadoBridge/.build -type f -name 'LegadoBridgeDebug' \
            -path '*Release-iphoneos*' -not -path '*dSYM*' 2>/dev/null | head -1 || true)
          if [[ -z "$DEBUG_DYLIB" ]]; then
            DEBUG_DYLIB=$(find LegadoBridge/.build -type f -name 'libLegadoBridgeDebug.dylib' \
              -path '*Release-iphoneos*' 2>/dev/null | head -1 || true)
          fi
          echo "==> 主 dylib: ${DYLIB:-（无）}"
          echo "==> 调试 dylib: ${DEBUG_DYLIB:-（无）}"
          mkdir -p dist
          bash tools/repack/repack_forensics.sh \
            legado-debug \
            "ipa/香色闺阁2.56.1_未加密.ipa" \
            "${DYLIB:-}" \
            "${DEBUG_DYLIB:-}" \
            "dist/StandarReader-legado-bridge-debug.ipa"
          ls -la dist/
          test -f dist/StandarReader-legado-bridge-debug.ipa.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: LegadoBridge-IPA-Debug
          path: |
            dist/StandarReader-legado-bridge-debug.ipa
            dist/StandarReader-legado-bridge-debug.ipa.sha256
            LegadoBridge/spm-build-debug.log
          if-no-files-found: warn
